<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Missão no Brasil 🗺️ | Enlace Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--tl:#1a7a6e;--am:#f59e0b;--rs:#e11d48;--vd:#16a34a;--az:#1e3a5f}
body{background:#0a1f1e;font-family:'Nunito',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#071a18,#1a7a6e);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.tb-l{display:flex;align-items:center;gap:7px}
.tb-logo{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.4);overflow:hidden;flex-shrink:0}
.tb-logo img{width:100%;height:100%;object-fit:cover}
.tb-name{font-family:'Baloo 2',sans-serif;font-weight:800;color:#fff;font-size:13px;line-height:1}
.tb-sub{color:rgba(255,255,255,.5);font-size:9px}
.tb-pts{background:rgba(245,158,11,.25);border:1.5px solid rgba(245,158,11,.5);color:var(--am);font-weight:800;font-size:12px;padding:3px 10px;border-radius:16px}

/* MISSÃO */
.missao-bar{background:#fff;border-bottom:2px solid #99f6e4;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.m-icon{font-size:18px;flex-shrink:0}
.m-txt{flex:1;font-size:clamp(11px,2.8vw,13px);font-weight:700;color:#222;line-height:1.3}
.m-prog{font-size:10px;color:#aaa;white-space:nowrap;font-weight:700}

/* MAPA */
.mapa-area{flex:1;position:relative;overflow:hidden;background:#2d5a1b}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* CONTROLES */
.controles{flex-shrink:0;background:#0a1f1e;padding:8px 10px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.dpad{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:clamp(100px,28vw,130px)}
.dpad-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;font-size:clamp(14px,4vw,20px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;padding:clamp(8px,2vw,12px) 0;-webkit-tap-highlight-color:transparent}
.dpad-btn:active,.dpad-btn.pressed{background:rgba(245,158,11,.45);border-color:var(--am);transform:scale(.93)}
.dpad-btn.empty{background:transparent;border:none;pointer-events:none}
.info-panel{flex:1;display:flex;flex-direction:column;gap:5px;align-items:flex-start}
.nearby-hint{background:rgba(255,255,255,.08);border-radius:8px;padding:6px 10px;font-size:clamp(10px,2.5vw,13px);color:rgba(255,255,255,.8);line-height:1.4;min-height:40px;width:100%}
.nearby-hint .loc-name{color:var(--am);font-weight:800}
.action-btn{background:linear-gradient(135deg,var(--am),#d97706);border:none;border-radius:10px;padding:8px 14px;font-family:'Baloo 2',sans-serif;font-size:clamp(11px,2.8vw,14px);font-weight:800;color:#fff;cursor:pointer;width:100%;transition:all .15s;display:none}
.action-btn:active{transform:scale(.95)}
.conquistas-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.conq{font-size:clamp(16px,4vw,22px);opacity:.3;transition:all .3s;filter:grayscale(1)}
.conq.ok{opacity:1;filter:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;transition:all .25s}
.modal-overlay.hidden{display:none}
.modal-panel{background:#fff;border-radius:20px 20px 0 0;padding:16px 16px 24px;width:100%;max-width:540px;margin:0 auto;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 12px}
.m-chip{display:inline-flex;align-items:center;gap:4px;border-radius:16px;padding:3px 10px;font-size:10px;font-weight:800;color:#fff;margin-bottom:8px}
.m-chip.rest{background:#16a34a}.m-chip.hotel{background:#0891b2}.m-chip.transp{background:#7c3aed}.m-chip.saude{background:#dc2626}
.m-scene{font-size:clamp(26px,6vw,36px);margin-bottom:6px}
.m-title{font-family:'Baloo 2',sans-serif;font-size:clamp(16px,4vw,20px);font-weight:800;color:#222;margin-bottom:6px}
.m-pergunta{font-size:clamp(12px,3vw,15px);color:#444;margin-bottom:12px;line-height:1.5;background:#f0fdf4;border-left:3px solid var(--tl);border-radius:0 8px 8px 0;padding:9px 10px}
.m-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.m-opt{background:#f8fffe;border:2px solid #5eead4;border-radius:10px;padding:10px 12px;font-size:clamp(12px,3vw,15px);cursor:pointer;transition:all .18s;text-align:left;font-family:'Nunito',sans-serif;font-weight:600;color:#222}
.m-opt:active{transform:scale(.98)}
.m-opt.correct{border-color:var(--vd);background:#dcfce7;color:#166534;pointer-events:none}
.m-opt.wrong{border-color:var(--rs);background:#fef2f2;color:#991b1b;pointer-events:none;text-decoration:line-through}
.m-fb{border-radius:10px;padding:10px 12px;font-size:clamp(11px,2.8vw,14px);margin-bottom:10px;display:none;line-height:1.5}
.m-fb.ok{background:#dcfce7;border:2px solid #4ade80;color:#166534}
.m-fb.err{background:#fef2f2;border:2px solid #fca5a5;color:#991b1b}
.m-audio{display:none;align-items:center;gap:4px;font-size:12px;color:var(--tl);font-weight:700;cursor:pointer;padding:5px 10px;background:#ccfbf1;border-radius:7px;margin-bottom:10px}
.m-close{width:100%;padding:11px;background:var(--tl);color:#fff;border:none;border-radius:10px;font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:none}

/* FIM */
.fim{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#071a18,#1a7a6e);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.fim-em{font-size:clamp(50px,12vw,72px);animation:bop 1s infinite alternate}
@keyframes bop{from{transform:translateY(0) scale(1)}to{transform:translateY(-10px) scale(1.05)}}
.fim-t{font-family:'Baloo 2',sans-serif;font-size:clamp(22px,6vw,36px);font-weight:800;color:#fff;margin-bottom:4px}
.fim-p{font-family:'Baloo 2',sans-serif;font-size:clamp(32px,8vw,52px);font-weight:800;color:var(--am);margin-bottom:8px}
.fim-frases{background:rgba(255,255,255,.1);border-radius:14px;padding:12px;width:100%;max-width:400px;text-align:left;margin-bottom:16px;max-height:200px;overflow-y:auto}
.fim-fr-title{font-weight:800;color:var(--am);font-size:13px;margin-bottom:6px}
.fim-fr-item{font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,.85);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);display:flex;gap:6px}
.fim-restart{background:linear-gradient(135deg,var(--am),#d97706);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:800;cursor:pointer}
</style>
</head>

    <div class="nearby-hint" id="nearby-hint">🗺️ Ande pelo mapa e encontre os locais!</div>
    <button class="action-btn" id="action-btn" onclick="entrarLocal()">🚪 Entrar!</button>
    <div class="conquistas-row">
      <span class="conq" id="c-restaurante" title="Restaurante">🍽️</span>
      <span class="conq" id="c-hotel" title="Hotel">🏨</span>
      <span class="conq" id="c-metro" title="Metrô">🚇</span>
      <span class="conq" id="c-farmacia" title="Farmácia">💊</span>
      <span class="conq" id="c-padaria" title="Padaria">☕</span>
      <span class="conq" id="c-aeroporto" title="Aeroporto">✈️</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-panel">
    <div class="m-handle"></div>
    <div id="m-chip" class="m-chip rest">🍽️ Restaurante</div>
    <div class="m-scene" id="m-scene">🍽️</div>
    <div class="m-title" id="m-title">No Restaurante</div>
    <div class="m-pergunta" id="m-pergunta"></div>
    <div class="m-opts" id="m-opts"></div>
    <div class="m-fb" id="m-fb"></div>
    <div class="m-audio" id="m-audio" onclick="spkAudio()">🔊 Ouvir a frase correta</div>
    <button class="m-close" id="m-close" onclick="fecharModal()">✅ Continuar!</button>
  </div>
</div>

<!-- FIM -->
<div class="fim" id="fim">
  <div class="fim-em">🏆</div>
  <div class="fim-t">Missão Cumprida!</div>
  <div class="fim-p" id="fim-p">0 pts</div>
  <div class="fim-frases">
    <div class="fim-fr-title">📚 Frases que você usou:</div>
    <div id="fim-frases"></div>
  </div>
  <button class="fim-restart" onclick="reiniciar()">🔄 Jogar de novo</button>
</div>

<script>
// ── MAPA ──────────────────────────────────────────────────────────────────
var C,CTX,W,H,SCALE=1;
var TILE=40; // pixels por tile no canvas lógico

// Locais: [tileX, tileY, nome, emoji, sit, cor]
var LOCAIS=[
  {id:"restaurante",x:2,y:2,nome:"Restaurante",sub:"Bom Sabor",emoji:"🍽️",sit:"rest",cor:"#16a34a"},
  {id:"hotel",x:11,y:2,nome:"Hotel",sub:"Hotel Brasil",emoji:"🏨",sit:"hotel",cor:"#0891b2"},
  {id:"metro",x:2,y:8,nome:"Metrô",sub:"Estação Sé",emoji:"🚇",sit:"transp",cor:"#7c3aed"},
  {id:"farmacia",x:11,y:8,nome:"Farmácia",sub:"Drogaria SP",emoji:"💊",sit:"saude",cor:"#dc2626"},
  {id:"padaria",x:6,y:12,nome:"Padaria",sub:"Café Central",emoji:"☕",sit:"rest",cor:"#d97706"},
  {id:"aeroporto",x:6,y:2,nome:"Aeroporto",sub:"Guarulhos",emoji:"✈️",sit:"transp",cor:"#7c3aed"}
];

// Personagem
var P={x:6.5,y:7,dir:0,step:0}; // x,y em tiles (float)
var SPEED=0.12; // tiles por frame
var moving=null,moveTimer=null;
var nearbyLocal=null;
var pts=0,visitados=new Set(),localAtual=null,respondeu=false;
var MISSOES=["restaurante","hotel","metro","farmacia","padaria","aeroporto"];
var missaoIdx=0;

// DADOS DOS LOCAIS
var DADOS={
  restaurante:{sit:"rest",label:"🍽️ Restaurante",scene:"🍽️",title:"No Restaurante Bom Sabor",
    p:'O garçom diz "Boa tarde! O que vai querer?" O que você responde?',
    opts:[{t:"Eu quero um frango com arroz e um suco, por favor.",c:true},{t:"Tengo hambre, señor.",c:false},{t:"Onde fica o banheiro?",c:false},{t:"A senha do Wi-Fi, por favor.",c:false}],
    frase:"Eu quero um frango com arroz e um suco, por favor.",
    exp:"✅ \"Eu quero...\" ou \"Para mim...\" são as formas certas de pedir!",
    bonus:"💡 Para pedir a conta → \"A conta, por favor!\" 🧾"},
  hotel:{sit:"hotel",label:"🏨 Hotel",scene:"🏨",title:"No Hotel Brasil",
    p:'A recepcionista diz "Boa noite!" Você quer se hospedar. O que você diz?',
    opts:[{t:"Boa noite! Eu tenho uma reserva. Meu nome é Carlos.",c:true},{t:"Onde fica o restaurante?",c:false},{t:"Estou com febre.",c:false},{t:"A conta, por favor!",c:false}],
    frase:"Boa noite! Eu tenho uma reserva.",
    exp:"✅ \"Eu tenho uma reserva\" + seu nome é o primeiro passo no hotel!",
    bonus:"💡 Para o Wi-Fi → \"O Wi-Fi é grátis? Qual é a senha?\" 📶"},
  metro:{sit:"transp",label:"🚇 Metrô",scene:"🚇",title:"Na Estação de Metrô",
    p:'Você está perdido. Não sabe como chegar ao aeroporto. Você para uma pessoa e diz:',
    opts:[{t:"Com licença! Como chego ao aeroporto?",c:true},{t:"Vire à direita!",c:false},{t:"Eu tenho uma reserva.",c:false},{t:"Estou com dor de cabeça.",c:false}],
    frase:"Com licença! Como chego ao aeroporto?",
    exp:"✅ \"Com licença!\" + a pergunta clara — educado e direto!",
    bonus:"💡 Se falarem rápido → \"Fale mais devagar, por favor!\" 🐢"},
  farmacia:{sit:"saude",label:"💊 Farmácia",scene:"💊🤕",title:"Na Farmácia",
    p:'O farmacêutico pergunta "Posso ajudar?" Você não está bem. O que você diz?',
    opts:[{t:"Estou com dor de cabeça e febre. Tem remédio?",c:true},{t:"Eu quero um café.",c:false},{t:"Vire à esquerda.",c:false},{t:"Onde fica o hotel?",c:false}],
    frase:"Estou com dor de cabeça e febre. Tem remédio?",
    exp:"✅ \"Estou com + sintoma\" — estrutura correta para falar de saúde!",
    bonus:"💡 Emergência → \"Preciso de um médico! Chame uma ambulância!\" 🚑"},
  padaria:{sit:"rest",label:"☕ Padaria",scene:"☕🥐",title:"No Café Central",
    p:'A atendente pergunta "O que vai ser?" Você quer café e pão de queijo.',
    opts:[{t:"Para mim, um café e um pão de queijo, por favor.",c:true},{t:"Estou com tosse.",c:false},{t:"Eu tenho uma reserva.",c:false},{t:"Para o aeroporto, por favor.",c:false}],
    frase:"Para mim, um café e um pão de queijo, por favor.",
    exp:"✅ \"Para mim...\" é outra forma ótima de pedir!",
    bonus:"🧀 Pão de queijo é uma delícia típica brasileira!"},
  aeroporto:{sit:"transp",label:"✈️ Aeroporto",scene:"✈️🎉",title:"No Aeroporto de Guarulhos",
    p:'O segurança diz algo rápido e você não entendeu. O que você diz?',
    opts:[{t:"Não entendi. Pode repetir mais devagar, por favor?",c:true},{t:"Obrigado, tchau!",c:false},{t:"A conta, por favor!",c:false},{t:"Estou com dor de estômago.",c:false}],
    frase:"Não entendi. Pode repetir mais devagar, por favor?",
    exp:"✅ \"Não entendi. Pode repetir?\" — a frase mais importante da viagem!",
    bonus:"🎉 Parabéns! Você completou todas as missões!"}
};

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
function setupCanvas(){
  C=document.getElementById("mapa");
  CTX=C.getContext("2d");
  var area=document.querySelector(".mapa-area");
  W=area.offsetWidth;H=area.offsetHeight;
  C.width=W;C.height=H;
  SCALE=Math.min(W,H)/((Math.max(...LOCAIS.map(l=>l.x))+4)*TILE);
}

// ── DRAW ──────────────────────────────────────────────────────────────────
var animFrame=0;
function draw(){
  CTX.clearRect(0,0,W,H);
  var s=SCALE*TILE;
  var mapW=(Math.max(...LOCAIS.map(l=>l.x))+4)*s;
  var mapH=(Math.max(...LOCAIS.map(l=>l.y))+5)*s;
  var ox=(W-mapW)/2,oy=(H-mapH)/2;

  // Fundo grama
  CTX.fillStyle="#4a7c59";CTX.fillRect(0,0,W,H);
  CTX.fillStyle="#3d6b4a";CTX.fillRect(ox,oy,mapW,mapH);

  // Ruas horizontais
  CTX.fillStyle="#8a8a8a";
  [5,10].forEach(function(row){CTX.fillRect(ox,oy+row*s,mapW,s*0.7);});
  // Ruas verticais
  [4.5,9.5].forEach(function(col){CTX.fillRect(ox+col*s,oy,s*0.7,mapH);});
  // Linhas centrais
  CTX.strokeStyle="rgba(255,255,255,.4)";CTX.setLineDash([8,6]);CTX.lineWidth=1.5;
  [5.35,10.35].forEach(function(row){CTX.beginPath();CTX.moveTo(ox,oy+row*s);CTX.lineTo(ox+mapW,oy+row*s);CTX.stroke();});
  [4.85,9.85].forEach(function(col){CTX.beginPath();CTX.moveTo(ox+col*s,oy);CTX.lineTo(ox+col*s,oy+mapH);CTX.stroke();});
  CTX.setLineDash([]);

  // Praça central
  CTX.fillStyle="#5a9e6a";
  CTX.beginPath();CTX.roundRect(ox+5.5*s,oy+6*s,3*s,2.5*s,6);CTX.fill();
  CTX.fillStyle="#3d8c4a";
  [[6,6.3],[7,6.3],[8,6.3],[6.5,7.2],[7.5,7.2]].forEach(function(t){
    CTX.beginPath();CTX.arc(ox+t[0]*s,oy+t[1]*s,s*0.22,0,Math.PI*2);CTX.fill();
  });
  // Label praça
  CTX.fillStyle="rgba(255,255,255,.6)";CTX.font="bold "+(s*0.16)+"px Nunito";CTX.textAlign="center";
  CTX.fillText("Praça da Sé",ox+7*s,oy+7.2*s);

  // Locais
  LOCAIS.forEach(function(loc){
    var lx=ox+loc.x*s,ly=oy+loc.y*s;
    var sz=s*1.1;
    var isDestino=MISSOES[missaoIdx]===loc.id&&!visitados.has(loc.id);
    var isVisit=visitados.has(loc.id);
    // Pulsação no destino
    if(isDestino){
      var pulse=0.85+0.15*Math.sin(animFrame*0.08);
      CTX.globalAlpha=0.35;CTX.fillStyle="#fbbf24";
      CTX.beginPath();CTX.arc(lx+sz/2,ly+sz/2,sz*0.75*pulse,0,Math.PI*2);CTX.fill();
      CTX.globalAlpha=1;
    }
    // Caixa do local
    CTX.globalAlpha=isVisit?0.4:1;
    CTX.fillStyle=loc.cor;
    CTX.beginPath();CTX.roundRect(lx,ly,sz,sz,s*0.15);CTX.fill();
    if(!isVisit){
      CTX.strokeStyle="rgba(255,255,255,.5)";CTX.lineWidth=1.5;
      CTX.beginPath();CTX.roundRect(lx,ly,sz,sz,s*0.15);CTX.stroke();
    }
    CTX.globalAlpha=1;
    // Emoji
    CTX.font=(s*0.48)+"px serif";CTX.textAlign="center";
    CTX.fillText(loc.emoji,lx+sz/2,ly+sz*0.58);
    // Nome
    CTX.font="bold "+(s*0.16)+"px Nunito";
    CTX.fillStyle=isVisit?"rgba(255,255,255,.4)":"rgba(255,255,255,.95)";
    CTX.fillText(loc.nome,lx+sz/2,ly+sz*0.82);
    // Sub
    CTX.font=(s*0.12)+"px Nunito";
    CTX.fillStyle="rgba(255,255,255,.55)";
    CTX.fillText(loc.sub,lx+sz/2,ly+sz*0.94);
    // Check visitado
    if(isVisit){
      CTX.font=(s*0.35)+"px serif";CTX.textAlign="center";
      CTX.fillText("✅",lx+sz*0.75,ly+sz*0.35);
    }
  });

  // Personagem
  var px=ox+P.x*s, py=oy+P.y*s;
  var ps=s*0.55;
  // Sombra
  CTX.fillStyle="rgba(0,0,0,.25)";
  CTX.beginPath();CTX.ellipse(px,py+ps*0.55,ps*0.4,ps*0.15,0,0,Math.PI*2);CTX.fill();
  // Bounce ao andar
  var bounce=moving?Math.abs(Math.sin(animFrame*0.18))*s*0.06:0;
  // Círculo
  CTX.fillStyle="#fbbf24";
  CTX.beginPath();CTX.arc(px,py-bounce,ps*0.45,0,Math.PI*2);CTX.fill();
  CTX.strokeStyle="white";CTX.lineWidth=2;
  CTX.beginPath();CTX.arc(px,py-bounce,ps*0.45,0,Math.PI*2);CTX.stroke();
  // Emoji face
  CTX.font=(ps*0.55)+"px serif";CTX.textAlign="center";
  CTX.fillText("😊",px,py-bounce+ps*0.19);

  animFrame++;
  requestAnimationFrame(draw);
}

// ── MOVIMENTO ──────────────────────────────────────────────────────────────
var keysDown={};
function startMove(dir){moving=dir;}
function stopMove(){moving=null;}

document.addEventListener("keydown",function(e){
  var map={"ArrowUp":"up","ArrowDown":"down","ArrowLeft":"left","ArrowRight":"right"};
  if(map[e.key]){moving=map[e.key];e.preventDefault();}
});
document.addEventListener("keyup",function(){moving=null;});

function updateMove(){
  if(!moving)return;
  var area=document.querySelector(".mapa-area");
  var s=SCALE*TILE;
  var mapW=Math.max(...LOCAIS.map(l=>l.x))+4;
  var mapH=Math.max(...LOCAIS.map(l=>l.y))+5;
  var nx=P.x,ny=P.y;
  if(moving==="up")ny-=SPEED;
  if(moving==="down")ny+=SPEED;
  if(moving==="left")nx-=SPEED;
  if(moving==="right")nx+=SPEED;
  nx=Math.max(0.3,Math.min(mapW-0.8,nx));
  ny=Math.max(0.3,Math.min(mapH-0.8,ny));
  P.x=nx;P.y=ny;
  checkNearby();
}

function checkNearby(){
  var closest=null,minDist=1.4;
  LOCAIS.forEach(function(loc){
    var lx=loc.x+0.55,ly=loc.y+0.55;
    var dist=Math.sqrt(Math.pow(P.x-lx,2)+Math.pow(P.y-ly,2));
    if(dist<minDist&&!visitados.has(loc.id)){minDist=dist;closest=loc;}
  });
  if(closest!==nearbyLocal){
    nearbyLocal=closest;
    var hint=document.getElementById("nearby-hint");
    var abtn=document.getElementById("action-btn");
    if(closest){
      hint.innerHTML='📍 Você está perto de: <span class="loc-name">'+closest.nome+'</span>!';
      abtn.style.display="block";
    } else {
      hint.innerHTML='🗺️ Ande pelo mapa e encontre os locais!';
      abtn.style.display="none";
    }
  }
}

function entrarLocal(){
  if(!nearbyLocal)return;
  var id=nearbyLocal.id;
  if(visitados.has(id)){return;}
  // Verificar se é a missão certa
  if(MISSOES[missaoIdx]!==id){
    var hint=document.getElementById("nearby-hint");
    hint.innerHTML='⭐ Sua missão: <span class="loc-name">'+MISSOES[missaoIdx]+'</span>! Vá para lá primeiro.';
    return;
  }
  localAtual=id;respondeu=false;
  var d=DADOS[id];
  var chip=document.getElementById("m-chip");
  chip.className="m-chip "+d.sit;chip.textContent=d.label;
  document.getElementById("m-scene").textContent=d.scene;
  document.getElementById("m-title").textContent=d.title;
  document.getElementById("m-pergunta").textContent=d.p;
  // Opções embaralhadas
  var opts=d.opts.slice();
  for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}
  var container=document.getElementById("m-opts");container.innerHTML="";
  var letras=["A","B","C","D"];
  opts.forEach(function(o,i){
    var btn=document.createElement("button");
    btn.className="m-opt";
    btn.textContent=letras[i]+". "+o.t;
    var oc=o.c;
    btn.onclick=function(){responder(oc,d,btn,container);};
    container.appendChild(btn);
  });
  document.getElementById("m-fb").style.display="none";
  document.getElementById("m-audio").style.display="none";
  document.getElementById("m-close").style.display="none";
  document.getElementById("modal-overlay").classList.remove("hidden");
  moving=null;
  setTimeout(function(){spk(d.p);},300);
}

function responder(correct,d,btn,container){
  if(respondeu)return;respondeu=true;
  container.querySelectorAll(".m-opt").forEach(function(b){b.style.pointerEvents="none";});
  if(correct){
    btn.className="m-opt correct";pts+=20;
  } else {
    btn.className="m-opt wrong";pts+=5;
    container.querySelectorAll(".m-opt").forEach(function(b){
      if(b.textContent.includes(d.frase.substring(0,12)))b.className="m-opt correct";
    });
  }
  document.getElementById("pts-val").textContent=pts;
  var fb=document.getElementById("m-fb");
  fb.style.display="block";
  fb.className="m-fb "+(correct?"ok":"err");
  fb.innerHTML=(correct?"<strong>🎉 Correto! +20 pts</strong>":"<strong>❌ Quase! +5 pts</strong>")+"<br>"+d.exp+"<br><em>"+d.bonus+"</em>";
  var au=document.getElementById("m-audio");au.style.display="inline-flex";au.textContent="🔊 "+d.frase;
  document.getElementById("m-close").style.display="block";
  spk(d.frase);
}

function fecharModal(){
  document.getElementById("modal-overlay").classList.add("hidden");
  visitados.add(localAtual);
  document.getElementById("c-"+localAtual).classList.add("ok");
  if(missaoIdx<MISSOES.length&&MISSOES[missaoIdx]===localAtual)missaoIdx++;
  document.getElementById("m-prog").textContent=visitados.size+"/6";
  nearbyLocal=null;
  document.getElementById("action-btn").style.display="none";
  document.getElementById("nearby-hint").innerHTML="🗺️ Ótimo! Continue andando pelo mapa!";
  if(visitados.size>=MISSOES.length){setTimeout(mostrarFim,400);return;}
  atualizarMissao();
}

function atualizarMissao(){
  if(missaoIdx>=MISSOES.length){mostrarFim();return;}
  var id=MISSOES[missaoIdx];
  var loc=LOCAIS.find(function(l){return l.id===id;});
  if(loc){
    document.getElementById("m-icon").textContent=loc.emoji;
    document.getElementById("m-txt").textContent="Missão: vá até "+loc.emoji+" "+loc.nome+"!";
  }
}

function mostrarFim(){
  document.getElementById("fim").style.display="flex";
  document.getElementById("fim-p").textContent=pts+" pts";
  var list=document.getElementById("fim-frases");list.innerHTML="";
  Object.values(DADOS).forEach(function(d){
    var div=document.createElement("div");div.className="fim-fr-item";
    div.innerHTML=d.scene+" <span>"+d.frase+"</span>";list.appendChild(div);
  });
}

function reiniciar(){
  pts=0;missaoIdx=0;visitados.clear();localAtual=null;respondeu=false;nearbyLocal=null;
  P.x=6.5;P.y=7;
  document.getElementById("pts-val").textContent="0";
  document.getElementById("fim").style.display="none";
  document.getElementById("m-prog").textContent="0/6";
  document.querySelectorAll(".conq").forEach(function(c){c.classList.remove("ok");});
  document.getElementById("action-btn").style.display="none";
  document.getElementById("nearby-hint").innerHTML="🗺️ Ande pelo mapa e encontre os locais!";
  atualizarMissao();
}

// ÁUDIO
function getBRV(){var a=speechSynthesis.getVoices();var b=a.filter(function(x){return x.lang==="pt-BR";});return b.length?b:a.filter(function(x){return x.lang.startsWith("pt");});}
function spk(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="pt-BR";u.rate=0.85;u.pitch=1.1;var v=getBRV();if(v.length)u.voice=v[0];speechSynthesis.speak(u);}
function spkAudio(){var d=DADOS[localAtual];if(d)spk(d.frase);}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};
  document.addEventListener("touchstart",function u(){var x=new SpeechSynthesisUtterance("");x.volume=0;speechSynthesis.speak(x);document.removeEventListener("touchstart",u);},{once:true});}

// LOOP
function gameLoop(){updateMove();setTimeout(gameLoop,16);}
window.addEventListener("load",function(){setupCanvas();draw();gameLoop();atualizarMissao();});
window.addEventListener("resize",setupCanvas);
</script>
</body>
</html>
